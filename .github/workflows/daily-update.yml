name: 台股每日晨報

on:
  schedule:
    - cron: '30 0 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝依賴
        run: pip install yfinance -q

      - name: 執行每日更新
        env:
          EMAIL_PASSWORD: "${{ secrets.EMAIL_PASSWORD }}"
          EMAIL_TO: "${{ secrets.EMAIL_TO }}"
       
        run: python update.p
                                                                                             - name: 推送更新後的報
        run: |                                                                                   git config user.na
          git config user.email "github-actions[bot]@users.noreply.github.com"                   git add index.html
          git diff --staged --quiet || git commit -m "每日更新 $(date '+%Y-%m-%d %H:%M UTC')"
          git push
